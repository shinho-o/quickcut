<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ meta.title }} · QuickCut</title>
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
<script>
window.PROJECT = {{ meta | tojson | safe }};
window.PRESETS = {{ style_presets | tojson | safe }};
</script>
</head>
<body>
<header class="site">
    <a class="home-link" href="/">← 목록</a>
    <h1 class="proj-header">
        <input id="title" value="{{ meta.title }}" class="title-edit">
    </h1>
</header>

<main class="wrap editor">

    <aside class="side">
        <button id="analyzeBtn" class="btn-primary">자동 분석 (자막 + 무음 감지)</button>
        <div id="analyzeStatus" class="status"></div>

        <section class="card">
            <h3>내보내기 설정</h3>

            <label class="fld">
                <span>자막 스타일</span>
                <select id="stylePreset">
                    {% for key, preset in style_presets.items() %}
                    <option value="{{ key }}" {% if meta.style_preset == key %}selected{% endif %}>{{ preset.label }}</option>
                    {% endfor %}
                </select>
            </label>

            <label class="fld">
                <span>영상 비율</span>
                <select id="orientation">
                    <option value="original" {% if meta.orientation == 'original' %}selected{% endif %}>원본 그대로</option>
                    <option value="vertical" {% if meta.orientation == 'vertical' %}selected{% endif %}>9:16 세로</option>
                </select>
            </label>

            <label class="fld inline primary-toggle">
                <input type="checkbox" id="smartEdit" {% if meta.smart_edit %}checked{% endif %}>
                <span><strong>똑똑한 자동 편집</strong> <small>(단어 단위 컷 · 간투어 제거)</small></span>
            </label>

            <div id="smartEditOpts" style="{% if not meta.smart_edit %}display:none{% endif %};margin-left:20px">
                <label class="fld inline">
                    <input type="checkbox" id="removeFillers" {% if meta.remove_fillers %}checked{% endif %}>
                    <span>간투어 제거 (음/어/그)</span>
                </label>
                <label class="fld inline">
                    <input type="checkbox" id="aggressiveFillers" {% if meta.aggressive_fillers %}checked{% endif %}>
                    <span>공격적 제거 (+좀/막/진짜/그냥)</span>
                </label>
                <label class="fld">
                    <span>컷 임계값 (초, 이보다 긴 공백 자름)</span>
                    <input type="number" id="jumpGap" step="0.1" min="0.1" max="2.0" value="{{ meta.jump_gap or 0.4 }}">
                </label>
            </div>

            <label class="fld inline">
                <input type="checkbox" id="skipSilence" {% if meta.skip_silence %}checked{% endif %}>
                <span>무음 구간 자동 스킵 <small>(기본)</small></span>
            </label>

            <label class="fld inline">
                <input type="checkbox" id="wordHighlight" {% if meta.word_highlight %}checked{% endif %}>
                <span>단어 하이라이트 자막 <small>(Opus Clip 스타일)</small></span>
            </label>

            <label class="fld inline">
                <input type="checkbox" id="smartCrop" {% if meta.smart_crop %}checked{% endif %}>
                <span>얼굴 추적 크롭 (9:16 선택 시)</span>
            </label>

            <label class="fld inline">
                <input type="checkbox" id="autoHighlight" {% if meta.auto_highlight %}checked{% endif %}>
                <span>하이라이트 자동 선택</span>
            </label>

            <label class="fld" id="highlightDurField" style="{% if not meta.auto_highlight %}display:none{% endif %}">
                <span>목표 길이 (초)</span>
                <input type="number" id="highlightDuration" min="15" max="300" value="{{ meta.highlight_duration or 60 }}">
            </label>

            <button id="exportBtn" class="btn-primary">영상 내보내기</button>
            <div id="exportStatus" class="status"></div>
        </section>
    </aside>

    <div class="clips" id="clipsRoot">
        <!-- JS 로 클립 카드 렌더 -->
    </div>

</main>

<script src="{{ url_for('static', filename='project.js') }}"></script>
</body>
</html>
